name: Convert PaddleOCR Models to .nb

on:
  workflow_dispatch:   # 手动触发，点按钮就行

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # ── 1. 安装 paddlelite（Linux x86_64 有预编译包）──────────────────────
      - name: Install paddlelite
        run: pip install paddlepaddle paddlelite

      # ── 2. 下载三个 inference 模型（百度 BOS，Linux 环境可访问）────────────
      - name: Download PP-OCRv3 inference models
        run: |
          # 检测模型
          wget -q https://paddleocr.bj.bcebos.com/PP-OCRv3/chinese/ch_PP-OCRv3_det_slim_infer.tar
          tar xf ch_PP-OCRv3_det_slim_infer.tar

          # 识别模型
          wget -q https://paddleocr.bj.bcebos.com/PP-OCRv3/chinese/ch_PP-OCRv3_rec_slim_infer.tar
          tar xf ch_PP-OCRv3_rec_slim_infer.tar

          # 方向分类模型（v2.0，v3 没有单独的 cls 模型）
          wget -q https://paddleocr.bj.bcebos.com/dygraph_v2.0/slim/ch_ppocr_mobile_v2.0_cls_slim_infer.tar
          tar xf ch_ppocr_mobile_v2.0_cls_slim_infer.tar

          echo "=== Downloaded files ==="
          ls -la

      # ── 3. 转换为 .nb 格式 ────────────────────────────────────────────────
      - name: Convert models to .nb (Paddle Lite format)
        run: |
          # 检测模型
          paddle_lite_opt \
            --model_file=ch_PP-OCRv3_det_slim_infer/inference.pdmodel \
            --param_file=ch_PP-OCRv3_det_slim_infer/inference.pdiparams \
            --optimize_out=ch_PP-OCRv3_det_slim_opt \
            --valid_targets=arm \
            --optimize_out_type=naive_buffer

          # 识别模型
          paddle_lite_opt \
            --model_file=ch_PP-OCRv3_rec_slim_infer/inference.pdmodel \
            --param_file=ch_PP-OCRv3_rec_slim_infer/inference.pdiparams \
            --optimize_out=ch_PP-OCRv3_rec_slim_opt \
            --valid_targets=arm \
            --optimize_out_type=naive_buffer

          # 方向分类模型
          paddle_lite_opt \
            --model_file=ch_ppocr_mobile_v2.0_cls_slim_infer/inference.pdmodel \
            --param_file=ch_ppocr_mobile_v2.0_cls_slim_infer/inference.pdiparams \
            --optimize_out=ch_ppocr_mobile_v2.0_cls_slim_opt \
            --valid_targets=arm \
            --optimize_out_type=naive_buffer

          echo "=== Converted .nb files ==="
          ls -lh *.nb

      # ── 4. 下载字典文件 ───────────────────────────────────────────────────
      - name: Download dictionary file
        run: |
          wget -q https://raw.githubusercontent.com/PaddlePaddle/PaddleOCR/release/2.7/ppocr/utils/ppocr_keys_v1.txt
          echo "Dictionary lines: $(wc -l < ppocr_keys_v1.txt)"

                 # ── 5. 下载 Paddle Lite Java 库并列出所有文件 ─────────────────────────
      - name: Download and inspect Paddle Lite library
        run: |
          wget -q https://github.com/PaddlePaddle/Paddle-Lite/releases/download/v2.12/inference_lite_lib.android.armv8.gcc.c++_shared.with_extra.with_cv.tar.gz \
            -O paddle_lite_android.tar.gz
          tar xf paddle_lite_android.tar.gz
          echo "=== ALL FILES IN ARCHIVE ==="
          find . -name "*.jar" -o -name "*.so" -o -name "*.aar" | sort

      # ── 6. 整理所有文件 ───────────────────────────────────────────────────
      - name: Collect all files
        run: |
          mkdir -p paddle_ocr_assets/models
          mkdir -p paddle_ocr_assets/java_lib/arm64-v8a

          cp *.nb paddle_ocr_assets/models/
          cp ppocr_keys_v1.txt paddle_ocr_assets/models/

          # 复制所有找到的 jar 和 so
          find . -name "*.jar" -exec cp {} paddle_ocr_assets/java_lib/ \; 2>/dev/null || true
          find . -name "*.so" -exec cp {} paddle_ocr_assets/java_lib/arm64-v8a/ \; 2>/dev/null || true

          echo "=== Final assets ==="
          find paddle_ocr_assets -type f -exec ls -lh {} \;


      # ── 7. 上传为 artifact（供下载）──────────────────────────────────────
      - name: Upload paddle_ocr_assets
        uses: actions/upload-artifact@v4
        with:
          name: paddle-ocr-assets
          path: paddle_ocr_assets/
          retention-days: 7
